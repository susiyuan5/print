name: 部署 Spray Workbench 到 GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: spray-workbench/package-lock.json
      - name: 安装依赖
        run: npm ci
        working-directory: spray-workbench
      - name: 构建
        run: npm run build
        working-directory: spray-workbench
      - name: 测试
        run: npm test
        working-directory: spray-workbench
      - name: 依赖安全审计
        run: npm audit --omit=dev --audit-level=high
        working-directory: spray-workbench
      - name: 上传 Pages 构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: spray-workbench/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4
